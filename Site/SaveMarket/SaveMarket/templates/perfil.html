{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Perfil</title>

    <link rel="stylesheet" href="{% static 'css/perfil.css' %}">
</head>
<body>

    <div class="perfil-container">
        <a href="{% url 'home' %}" style="display: flex; align-items: center; text-decoration: none; color: #333; margin-bottom: 20px; font-weight: bold;">
            ← Voltar para Ofertas
        </a>

        <div class="perfil-topo">
            <h1>Perfil</h1>
        </div>

        <div class="perfil-info">

            {% if request.user.perfil.foto %}
                <img src="{{ request.user.perfil.foto.url }}" class="foto-perfil" alt="Foto de perfil">
            {% else %}
                <div class="foto-perfil"></div>
            {% endif %}

            <h2>{{ request.user.get_full_name|default:request.user.username }}</h2>

            <p>{{ request.user.email }}</p>

        </div>

        <div class="menu-perfil">

            <a href="{% url 'meus_dados' %}" class="opcao">
                <span>Meus Dados</span>
                <span>></span>
            </a>

            <a href="{% url 'enderecos' %}" class="opcao">
                <span>Endereços</span>
                <span>></span>
            </a>

            <div class="opcao opcao-desativada">
                <span>Métodos de Pagamento</span>
                <span>></span>
            </div>

            <div class="opcao opcao-desativada">
                <span>Pedidos</span>
                <span>></span>
            </div>

            <div class="opcao opcao-desativada">
                <span>Ajuda</span>
                <span>></span>
            </div>

        </div>

        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button type="submit" class="btn-sair">
                Sair da Conta
            </button>
        </form>

    </div>

</body>
</html>
