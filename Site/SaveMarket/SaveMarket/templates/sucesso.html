{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content=\"width=device-width, initial-scale=1.0\">
    <title>Pedido Confirmado — SaveMarket</title>
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
<main style="max-width: 500px; margin: 60px auto; padding: 20px; text-align: center; font-family: Arial, sans-serif;">
    <div style="font-size: 60px; color: #00B86B; margin-bottom: 20px;">
        <i class="fa-solid fa-circle-check"></i>
    </div>
    <h1 style="color: #333; margin-bottom: 10px;">Pedido Confirmado!</h1>
    <p style="color: #666; font-size: 16px; margin-bottom: 30px;">Seu pedido foi enviado ao estabelecimento. Vá até lá para retirar seus produtos antes do horário de vencimento!</p>
    
    <div style="background: #f4fbf7; border: 1px solid #c3ebd6; padding: 15px; border-radius: 8px; margin-bottom: 30px;">
        <span style="color: #155724; font-weight: bold; display: block; margin-bottom: 5px;">
            <i class="fa-solid fa-piggy-bank"></i> Você economizou muito!
        </span>
        <p style="margin: 0; color: #155724; font-size: 18px;">R$ {{ economia|floatformat:2 }} salvos nesta compra.</p>
    </div>

    <a href="{% url 'home' %}" class="btn-adicionar" style="text-decoration: none; padding: 12px 24px; display: inline-block;">
        Voltar para a Página Inicial
    </a>
</main>
</body>
</html>
